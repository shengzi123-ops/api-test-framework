name: API Test Framework CI
trigger:
  push:
    branches:
      - main

stage:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - "3307:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: 检出代码
        run: git clone $GITEE_REPO_URL . -b $GITEE_BRANCH
      
      - name: 安装 Python3.10
        run: |
          apt update && apt install -y python3.10 python3-pip
          ln -s /usr/bin/python3.10 /usr/bin/python
      
      - name: 安装项目依赖
        run: pip install -r requirements.txt
      - name: 执行测试
        run: pytest tests/ -v --html=reports/report.html --self-contained-html
      - name: 启动Mock服务
        run: |
          python server/mock_server.py &
          sleep 3
      
      - name: 执行自动化测试用例
        env:
          MYSQL_PASSWORD: test_password
          MYSQL_DATABASE: test_db
          BASE_URL: http://127.0.0.1:5000
          DASHSCOPE_API_KEY: ${{ env.DASHSCOPE_API_KEY }}
        run: pytest tests/ -v --html=reports/report.html --self-contained-html
      
      - name: 归档测试报告
        run: echo "归档报告完成"
        artifacts:
          - name: test-report
            path: reports/report.html