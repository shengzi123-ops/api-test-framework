name: API Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装MySQL客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client
      - name: 安装Python依赖
        run: pip install -r requirements.txt
      - name: 等待MySQL服务就绪
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -u root -ptest_password -e "SELECT 1" && break
            echo "等待MySQL启动... ($i/30)"
            sleep 2
          done
      - name: 初始化数据库表
        run: |
          mysql -h 127.0.0.1 -u root -ptest_password test_db < scripts/init_db.sql
          mysql -h 127.0.0.1 -u root -ptest_password -e "SHOW TABLES FROM test_db;"
      - name: 后台启动Mock服务
        run: |
          python server/mock_server.py &
          sleep 5
      - name: 执行测试
        run: |
          PYTHONPATH=$PYTHONPATH:${{ github.workspace }}:${{ github.workspace }}/.. \
          DB_HOST=127.0.0.1 \
          DB_PORT=3306 \
          DB_USER=root \
          DB_PASSWORD=test_password \
          DB_DATABASE=test_db \
          BASE_URL=http://127.0.0.1:5000 \
          pytest tests/ -v --html=reports/report.html --self-contained-html
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/..
