name: API Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:  # 支持手动触发流水线

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装MySQL客户端
        run: sudo apt-get update && sudo apt-get install -y mysql-client
      - name: 安装Python依赖
        run: pip install -r requirements.txt
      - name: 创建报告目录
        run: mkdir -p reports
      - name: 等待MySQL服务就绪
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -u root -ptest_password -e "SELECT 1" 2>/dev/null && echo "MySQL已就绪" && break
            echo "等待MySQL启动... ($i/30)"
            sleep 2
          done
      - name: 初始化数据库表
        run: |
          mysql -h 127.0.0.1 -u root -ptest_password test_db < scripts/init_db.sql
          mysql -h 127.0.0.1 -u root -ptest_password -e "SHOW TABLES FROM test_db;"
      - name: 执行测试（包含Mock服务）
        run: |
          # 设置环境变量
          export DB_HOST=127.0.0.1
          export DB_PORT=3306
          export DB_USER=root
          export DB_PASSWORD=test_password
          export DB_DATABASE=test_db
          export BASE_URL=http://127.0.0.1:5000
          export PYTHONPATH=$PYTHONPATH:${{ github.workspace }}:${{ github.workspace }}/..
          
          # 后台启动Mock服务
          python server/mock_server.py &
          MOCK_PID=$!
          echo "Mock服务PID: $MOCK_PID"
          
          # 等待Mock服务启动
          sleep 5
          
          # 检查Mock服务是否运行
          if ps -p $MOCK_PID > /dev/null; then
            echo "Mock服务运行正常"
          else
            echo "Mock服务启动失败"
            exit 1
          fi
          
          # 执行测试
          pytest tests/ -v --html=reports/report.html --self-contained-html --tb=short
          
          # 保存退出码
          TEST_EXIT_CODE=$?
          
          # 停止Mock服务
          kill $MOCK_PID 2>/dev/null || true
          
          # 返回测试退出码
          exit $TEST_EXIT_CODE
